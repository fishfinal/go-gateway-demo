services:
  node1:
    build: .
    container_name: gateway-node1
    environment:
      - PORT=8080
    networks:
      ha_net:
        ipv4_address: 192.168.0.201
    ports:
      - "8081:8080"   # 映射到宿主机，方便单独调试
    restart: unless-stopped

  node2:
    build: .
    container_name: gateway-node2
    environment:
      - PORT=8080
    networks:
      ha_net:
        ipv4_address: 192.168.0.202
    ports:
      - "8082:8080"
    restart: unless-stopped

  node3:
    build: .
    container_name: gateway-node3
    environment:
      - PORT=8080
    networks:
      ha_net:
        ipv4_address: 192.168.0.203
    ports:
      - "8083:8080"
    restart: unless-stopped

networks:
  ha_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.0.0/24
          gateway: 192.168.0.1
